name: Build
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev libglib2.0-dev libssl-dev patchelf
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles deb,appimage
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-linux
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-windows
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles dmg
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-macos
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore
