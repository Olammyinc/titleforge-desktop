name: Build
on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  TAURI_UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
  TAURI_UPDATER_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}

jobs:
  build-linux-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev libglib2.0-dev libssl-dev patchelf
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles deb
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-linux-deb
          path: src-tauri/target/release/bundle/deb/*
          if-no-files-found: ignore

  build-linux-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev libglib2.0-dev libssl-dev patchelf
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles appimage
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-windows
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles dmg
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-macos
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-deb, build-linux-appimage, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: titleforge-*, merge-multiple: true }
      - name: Find binaries, collect signatures, generate updates.json
        run: |
          mkdir -p dist
          find . -name "*.exe" -exec cp {} dist/ \;
          find . -name "*.dmg" -exec cp {} dist/ \;
          find . -name "*.deb" -exec cp {} dist/ \;
          find . -name "*.AppImage" -exec cp {} dist/ \;
          find . -name "*.sig" -exec cp {} dist/ \;
          
          # Determine version from tag name (strip 'v' prefix)
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          
          # Build updates.json with actual signatures
          cat > dist/updates.json << 'JSONEOF'
          {
            "version": "VER_PLACEHOLDER",
            "notes": "Auto-release from CI",
            "pub_date": "DATE_PLACEHOLDER",
            "platforms": {
              "windows-x86_64": {
                "signature": "SIG_WIN",
                "url": "https://github.com/Olammyinc/titleforge-desktop/releases/download/${{ github.ref_name }}/TitleForge_${VER}_x64-setup.exe"
              },
              "darwin-x86_64": {
                "signature": "SIG_MAC",
                "url": "https://github.com/Olammyinc/titleforge-desktop/releases/download/${{ github.ref_name }}/TitleForge_${VER}_x64.dmg"
              },
              "linux-x86_64": {
                "signature": "SIG_LINUX",
                "url": "https://github.com/Olammyinc/titleforge-desktop/releases/download/${{ github.ref_name }}/TitleForge_${VER}_amd64.AppImage"
              }
            }
          }
          JSONEOF
          
          # Fill in signatures from .sig files
          for sigfile in dist/*.sig; do
            [ -f "$sigfile" ] || continue
            sigcontent=$(cat "$sigfile")
            base=$(basename "$sigfile")
            if echo "$base" | grep -qi "setup.exe"; then
              sed -i "s|SIG_WIN|$sigcontent|" dist/updates.json
            elif echo "$base" | grep -qi "x64.dmg"; then
              sed -i "s|SIG_MAC|$sigcontent|" dist/updates.json
            elif echo "$base" | grep -qi "amd64.AppImage"; then
              sed -i "s|SIG_LINUX|$sigcontent|" dist/updates.json
            fi
          done
          
          # Fill in version and date
          TODAY=$(date -u +"%Y-%m-%dT00:00:00Z")
          sed -i "s/VER_PLACEHOLDER/$VER/" dist/updates.json
          sed -i "s/DATE_PLACEHOLDER/$TODAY/" dist/updates.json
          
          echo "--- updates.json ---"
          cat dist/updates.json
          echo ""
          ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: TitleForge v${{ github.ref_name }}
          body: "Generated release with signed binaries and auto-update manifest."
          files: dist/*
          generate_release_notes: true
      - name: Deploy updates.json to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "No NETLIFY_AUTH_TOKEN secret set — skipping Netlify deploy."
            echo "To enable auto-deploy, add your Netlify PAT to repo secrets."
            exit 0
          fi
          SITE_ID="titleforge-tool"
          # Read file, escape for JSON string
          UPDATES_JSON=$(cat dist/updates.json | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\": {\"/updates.json\": $UPDATES_JSON}}" \
            "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deployed:', d.get('ssl_url','?'))"
