name: Build
on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  TAURI_UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
  TAURI_UPDATER_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev libglib2.0-dev libssl-dev patchelf
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles deb,appimage
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-linux
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-windows
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npx @tauri-apps/cli@latest build --bundles dmg
      - uses: actions/upload-artifact@v4
        with:
          name: titleforge-macos
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: titleforge-*, merge-multiple: true }
      - run: |
          echo "## TitleForge v${{ github.ref_name }}" > notes.md
          echo "" >> notes.md
          echo "### Downloads" >> notes.md
          for f in *; do echo "- [$f]($f)" >> notes.md; done
      - uses: softprops/action-gh-release@v2
        with:
          name: TitleForge v${{ github.ref_name }}
          body_path: notes.md
          files: .
          generate_release_notes: true
