<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B87333"/>
      <stop offset="100%" style="stop-color:#8B5A2B"/>
    </linearGradient>
    <linearGradient id="ember" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#D45113"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#1C1C1C"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="50%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background circle / stamp base -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="url(#copper)" stroke-width="2.5" opacity="0.6"/>
  <circle cx="40" cy="40" r="34" fill="none" stroke="url(#copper)" stroke-width="0.75" opacity="0.3"/>

  <!-- Hammer — diagonal top-left to bottom-right -->
  <!-- Handle -->
  <rect x="20" y="16" width="6" height="48" rx="2" fill="url(#steel)" transform="rotate(35, 23, 40)"/>
  <!-- Grip wrap lines -->
  <line x1="18" y1="50" x2="28" y2="52" stroke="url(#copper)" stroke-width="1" opacity="0.5" transform="rotate(35, 23, 40)"/>
  <line x1="17" y1="54" x2="27" y2="56" stroke="url(#copper)" stroke-width="1" opacity="0.5" transform="rotate(35, 23, 40)"/>
  <!-- Head -->
  <rect x="8" y="6" width="20" height="12" rx="3" fill="url(#copper)" transform="rotate(35, 23, 40)"/>
  <!-- Head face highlight -->
  <rect x="10" y="8" width="16" height="3" rx="1" fill="url(#ember)" opacity="0.6" transform="rotate(35, 23, 40)"/>

  <!-- Pen — diagonal top-right to bottom-left -->
  <!-- Body -->
  <rect x="48" y="16" width="6" height="48" rx="2" fill="url(#copper)" transform="rotate(-35, 54, 40)"/>
  <!-- Nib -->
  <polygon points="48,12 60,12 54,16" fill="url(#ember)" transform="rotate(-35, 54, 40)"/>
  <!-- Nib slit -->
  <line x1="54" y1="12" x2="54" y2="20" stroke="#1C1C1C" stroke-width="0.75" transform="rotate(-35, 54, 40)"/>
  <!-- Pen clip -->
  <rect x="48" y="30" width="2" height="14" rx="1" fill="url(#ember)" opacity="0.5" transform="rotate(-35, 54, 40)"/>

  <!-- Impact point / spark where they cross -->
  <circle cx="40" cy="40" r="5" fill="url(#ember)" opacity="0.8"/>
  <circle cx="40" cy="40" r="2" fill="#FAF8F5"/>
  <!-- Spark rays -->
  <line x1="40" y1="40" x2="36" y2="34" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="40" y1="40" x2="45" y2="33" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="40" x2="34" y2="43" stroke="#FF6B35" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Ground glow -->
  <ellipse cx="40" cy="62" rx="14" ry="4" fill="url(#glow)"/>
</svg>
